name: Build Kodi repository index

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build repository index
        run: python3 tools/build_repo.py

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(repo): rebuild Kodi repository index"
          file_pattern: "addons.xml addons.xml.md5 repository.*/*.zip"
